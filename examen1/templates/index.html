    <button class="drawer-card-btn" type="button" aria-label="Drawer card" 
    data-popup-title="DILAB" 
    data-popup-short="Toevoegingen aan DIPPER binnen het DI-LAB." 
    data-popup-big="Binnen het DI-LAB heb ik gewerkt aan een zelf gemaakt programma genaamd DIPPER, dit is een programma dat gebruikt wordt om research projects en dergelijke op te slaan zodat ze dat als lectoraat weer terug kunnen vinden
    
Probleem: DIPPER was een programma dat goed voor zijn taak was om dingen op te slaan, maar het was nogsteeds moeilijk om alle data op te halen en heel vaak was het ook verkeerd opgeschreven.
    
Doelstelling: Mijn doel was eerst om het meer gebruikersvriendelijk te maken. Dit is vooral gedaan door de mobiele versie te ontwerpen en te implementeren. Daarnaast heb ik ook nog gewerkt aan een complex regex systeem die dynamisch binnen het systeem gemaakt kan worden en niet hardegecode in de code staat. Dit is allemaal opgeslagen binnen een MongoDB database. Ook heb ik hiermee een dashboard gemaakt wat helemaal dynamisch in de database staat, er staat dus niks in de code en je kan makkelijk op de website zelf eentje aanmaken.">
        <img src="/static/pictures/dilablogo.png" alt="DILAB logo">
    </button>
    <button class="drawer-card-btn-right" type="button" aria-label="Volkstuin logo" 
    data-popup-title="Volkstuinvereniging Sittard" 
    data-popup-short="Meehelpen bij het maken van een nieuwe website voor de Volkstuinvereniging Sittard." 
    data-popup-big="Probleemstelling: De huidige website van de Volkstuinvereniging Sittard was heel slordig en niet handig voor de oudere medewerkers van het VTV. Er werden nogsteeds aanvragen gedaan via de mail en dit werd heel vaak verkeerd ingevuld.
    
Doelstelling: Mijn doel was om een nieuwe website te maken die makkelijk te gebruiken is voor de oudere medewerkers van het VTV. Hier was dus het plan om een plattegrond te maken wat overzichtbaar was voor de penningsmeester en makkelijk te onderhouden was. Wat veel tijd bespaard voor de vrijwilligers.">
