{% extends 'base.html' %}
{% block title %}Create New Researcher{% endblock %}

{% from "_config_fields.html" import render_config_fields %}


{% block content %}
    <h1>Create New Researcher</h1>
    <form action="/create_researcher" method="POST">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br>
        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" required><br>

        {{ render_config_fields(configurations) }} 

        <br>
        <button type="submit">Create</button>
    </form>
{% endblock %}
